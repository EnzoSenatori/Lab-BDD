<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lab-BDD | Livraria</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <header class="bg-white border-b p-6 text-center">
        <h1 class="text-3xl font-bold text-gray-800">Encontre seu livro</h1>
        <p class="text-gray-500">Pesquise por título, autor ou editora</p>
    </header>

    <main class="max-w-6xl mx-auto p-8">
        <form action="/buscar" method="POST" class="mb-12 flex gap-2">
            <input type="text" name="termo" placeholder="Ex: Harry Potter..."
                   class="w-full p-4 rounded-lg border border-gray-300 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
            <button type="submit" aria-label="Buscar livros"
                    class="bg-blue-600 text-white px-8 py-4 rounded-lg font-bold hover:bg-blue-700 transition">
                Buscar
            </button>
        </form>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            {% if livros %}
                {% for livro in livros %}
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition">
                    <h3 class="text-xl font-bold mb-2">{{ livro.titulo }}</h3>
                    <p class="text-gray-600 text-sm"><b>Autor:</b> {{ livro.autor }}</p>
                    <p class="text-gray-600 text-sm mb-4"><b>Editora:</b> {{ livro.editora }}</p>
                    <button onclick="verUnidades({{ livro.id }}, '{{ livro.titulo|escapejs }}')"
                            aria-label="Ver unidades disponíveis"
                            class="w-full bg-gray-100 text-gray-800 py-2 rounded-lg font-semibold hover:bg-gray-200">
                        Ver unidades
                    </button>
                </div>
                {% endfor %}
            {% endif %}
        </div>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl max-w-md w-full shadow-2xl">
            <h2 id="modal-titulo" class="text-2xl font-bold mb-4"></h2>
            <select id="select-unidades" class="w-full p-3 border rounded-lg mb-6"></select>
            <div class="flex gap-2">
                <button onclick="fecharModal()" aria-label="Cancelar reserva"
                        class="flex-1 py-3 text-gray-500 font-bold">Cancelar</button>
                <button onclick="confirmarReserva()" aria-label="Confirmar reserva"
                        class="flex-1 bg-green-600 text-white py-3 rounded-lg font-bold">Reservar</button>
            </div>
            <div id="resultado-reserva" class="mt-4 p-4 bg-green-50 text-green-700 rounded-lg hidden"></div>
        </div>
    </div>

    <script>
        let livroAtual = null;

        async function verUnidades(id, titulo) {
            try {
                livroAtual = id;
                const resp = await fetch(`/unidades/${id}`);
                if (!resp.ok) throw new Error("Erro ao buscar unidades");
                const unidades = await resp.json();

                const select = document.getElementById('select-unidades');
                select.innerHTML = unidades.map(u => `<option value="${u}">${u}</option>`).join('');

                document.getElementById('modal-titulo').innerText = titulo;
                document.getElementById('modal').classList.remove('hidden');
            } catch (err) {
                alert(err.message);
            }
        }

        function fecharModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('resultado-reserva').classList.add('hidden');
        }

        async function confirmarReserva() {
            try {
                const unidade = document.getElementById('select-unidades').value;
                const resp = await fetch('/reservar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ livro_id: livroAtual, unidade: unidade })
                });
                if (!resp.ok) throw new Error("Erro ao reservar");
                const data = await resp.json();

                const box = document.getElementById('resultado-reserva');
                box.innerHTML = `<b>Sucesso!</b><br>QR Code: <code class="bg-white px-1">${data.qr_code}</code>`;
                box.classList.remove('hidden');
                box.classList.add('bg-green-50', 'text-green-700');
                box.classList.remove('bg-red-50', 'text-red-700');
            } catch (err) {
                const box = document.getElementById('resultado-reserva');
                box.innerHTML = `<b>Falha!</b><br>${err.message}`;
                box.classList.remove('hidden');
                box.classList.add('bg-red-50', 'text-red-700');
                box.classList.remove('bg-green-50', 'text-green-700');
            }
        }

        // Fechar modal clicando fora
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') fecharModal();
        });
    </script>
</body>
</html>
